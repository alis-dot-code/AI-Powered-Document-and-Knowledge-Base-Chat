version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind_secret}
      POSTGRES_DB: ${POSTGRES_DB:-docmind}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docmind} -d ${POSTGRES_DB:-docmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docmind_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: docmind_backend_dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docmind}:${POSTGRES_PASSWORD:-docmind_secret}@postgres:5432/${POSTGRES_DB:-docmind}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: docmind_worker_dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docmind}:${POSTGRES_PASSWORD:-docmind_secret}@postgres:5432/${POSTGRES_DB:-docmind}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: docmind_beat_dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=debug --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docmind}:${POSTGRES_PASSWORD:-docmind_secret}@postgres:5432/${POSTGRES_DB:-docmind}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    container_name: docmind_gateway_dev
    restart: unless-stopped
    env_file: .env
    environment:
      FASTAPI_URL: http://backend:8000
      REDIS_URL: redis://redis:6379/0
      NODE_ENV: development
    volumes:
      - ./gateway/src:/app/src
    depends_on:
      - backend
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: docmind_frontend_dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - gateway
    ports:
      - "5173:5173"

volumes:
  postgres_dev_data:
  redis_dev_data:
